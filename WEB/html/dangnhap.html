<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Đăng nhập</title>
    <link href="../css/app.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <h1 class="form-heading">Đăng nhập</h1>
        <form id="login-form">
            <div class="form-group"><i class="fas fa-user"></i><input type="text" class="form-input" id="u" placeholder="Tên đăng nhập" required></div>
            <div class="form-group"><i class="fas fa-lock"></i><input type="password" class="form-input" id="p" placeholder="Mật khẩu" required></div>
            <button type="submit" class="form-submit">Đăng Nhập</button>
            <p class="footer-link">Chưa có tài khoản? <a href="../html/dangki.html">Đăng ký</a> | <a href="../html/quenmk.html">Quên mật khẩu</a></p>
        </form>
    </div>
   <script>
    document.getElementById('login-form').onsubmit = function(e) {
        e.preventDefault(); // Ngăn trang web tải lại
        
        const user = document.getElementById('u').value;
        const pass = document.getElementById('p').value;

        // 1. Kiểm tra tài khoản trong localStorage (do trang Đăng ký lưu vào)
        const storedPass = localStorage.getItem(user);

        if (storedPass && storedPass === pass) {
            // 2. Nếu đúng: Lưu trạng thái đăng nhập vào sessionStorage
            sessionStorage.setItem('userLoggedIn', user);
            
            // 3. Chuyển hướng về trang chủ
            // Nếu index.html cùng nằm trong folder html thì dùng "index.html"
            // Nếu index.html nằm ở thư mục gốc thì dùng "../index.html"
            window.location.href = "index.html"; 
        } else {
            alert("Sai tài khoản hoặc mật khẩu!");
        }
    };
</script>
</body>
</html>
