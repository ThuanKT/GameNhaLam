<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="stylesheet" href="../css/app.css">
<link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">

<title>Quên mật khẩu</title>
</head>

<body>

<div id="wrapper">
<form action="" id="form-login">

<h1 class="form-heading">Quên mật khẩu</h1>

<p class="form-desc">
Nhập địa chỉ email đã đăng ký của bạn. Chúng tôi sẽ gửi liên kết đặt lại mật khẩu.
</p>

<div class="form-group">
<i class="far fa-envelope"></i>
<input type="email" class="form-input" name="email" placeholder="Nhập email của bạn" required>
</div>

<input type="submit" value="Gửi yêu cầu" class="form-submit">

<p class="register-link">
Nhớ mật khẩu rồi?
<a href="../html/dangnhap.html">Đăng nhập</a>
</p>

</form>
</div>

</body>
</html>
