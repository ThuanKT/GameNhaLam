<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Game - Pro Version</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../CSS/pro.css">
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="avatar">
            <img src="../images/52113.jpg" alt="Avatar">
        </div>

        <div class="info">
            <h2>Florentino-sama</h2>
            <p><i class="fa fa-at"></i> playder</p>
            <p><i class="fa fa-calendar-alt"></i> Tham gia: 2023</p>
        </div>

        <div class="actions">
            <button class="edit" >
                <i class="fa fa-edit"></i> Sửa
            </button>
            <a href="index2.html">
                <button class="logout" >
                    <i class="fa fa-sign-out-alt"></i> Thoát
                </button>
            </a>
        </div>
    </div>

    <!-- CONTENT -->
    <div class="content">

        <!-- LEFT COLUMN -->
        <div class="left-column">

            <!-- STATS BOX -->
            <div class="box">
                <h3><i class="fa fa-chart-bar" style="color: #3b82f6;"></i> Thống kê</h3>
                <div class="stats">
                    <div class="stat">
                        <b>124</b>
                        <div>Game</div>
                    </div>
                    <div class="stat">
                        <b>45</b>
                        <div>Bình luận</div>
                    </div>
                    <div class="stat">
                        <b>1.2K</b>
                        <div>Điểm</div>
                    </div>
                </div>
            </div>

            <!-- RECENT GAMES BOX -->
            <div class="box">
                <h3><i class="fa fa-gamepad" style="color: #a855f7;"></i> Game gần đây</h3>
                
                <div class="game">
                    <img src="../../thuan/image/genshim.jpg">
                    <div>Genshin Impact</div>
                </div>

                <div class="game">
                    <img src="../../thuan/image/pubg.webp">
                    <div>PUBG Mobile</div>
                </div>
            </div>

        </div> <!-- End Left Column -->

        <!-- RIGHT COLUMN -->
        <div class="right-column">
            <div class="box">
                <h3><i class="fa fa-user-circle" style="color: var(--primary-color);"></i> Thông tin</h3>
                <div class="info-list">
                    <p>Email: <span>gamethu@gmail.com</span></p>
                    <p>SĐT: <span>0987xxx</span></p>
                    <p>Địa chỉ: <span>Hà Nội</span></p>
                    <p>Trạng thái: <span style="color:#22c55e;">● Online</span></p>
                </div>
            </div>
        </div>

    </div>
</div>

</body>
</html>
