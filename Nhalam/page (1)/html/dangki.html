<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Đăng ký tài khoản</title>
</head>
<body>

    <div id="wrapper">
        <h1 class="form-heading">Đăng ký</h1>

        <form id="register-form">
            <div class="form-group">
                <i class="fas fa-user"></i>
                <input type="text" class="form-input" id="reg-user" 
                       placeholder="Tên đăng nhập (viết liền)" 
                       maxlength="25" required>
            </div>

            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-input" id="reg-email" placeholder="Email" required>
            </div>

            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-input" id="reg-pass" placeholder="Mật khẩu" required>
            </div>

            <div class="form-group">
                <i class="fas fa-key"></i>
                <input type="password" class="form-input" id="re-pass" placeholder="Nhập lại mật khẩu" required>
            </div>

            <a href="dangnhap.html"><button type="submit" class="form-submit">TẠO TÀI KHOẢN</button></a>
            <p class="footer-link">Đã có tài khoản? <a href="trangdn.html">Đăng nhập ngay</a></p>
        </form>
    </div>
    <script src="../javascrip/dangki.js"></script>
</body>
</html>
