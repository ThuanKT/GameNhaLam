<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support Center</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: white;
            background:
                linear-gradient(rgba(15, 23, 42, 0.85), rgba(2, 6, 23, 0.9)),
                url('../image/nen_giao_dien.png') no-repeat center center fixed;
            background-size: cover;
        }

        .support-container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .header {
            width: 100%;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 1000;

            display: flex;
            align-items: center;

            background: rgba(15, 24, 45, 0.9);
            backdrop-filter: blur(10px);

            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        .home-btn {
            text-decoration: none;
            color: #22c55e;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 8px;
            background: rgba(34,197,94,0.1);
            transition: 0.3s;
        }

        .home-btn:hover {
            background: #22c55e;
            color: #000;
            box-shadow: 0 0 10px #22c55e;
        }

        /* FAQ */
        .faq {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow:
                0 4px 10px rgba(94, 159, 50, 0.4),
                0 0 5px rgba(6, 255, 97, 0.2);
            /* ánh sáng nhẹ */
        }

        .faq h3 {
            margin: 0;
            cursor: pointer;
        }

        .faq p {
            display: none;
            margin-top: 10px;
            color: #ccc;
        }

        /* FORM */
        .form-box {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow:
                0 4px 10px rgba(94, 159, 50, 0.4),
                0 0 5px rgba(6, 255, 97, 0.2);
            /* ánh sáng nhẹ */
        }

        .form-box,
        .faq {
            box-shadow:
                -20px 15px 40px rgba(6, 24, 41, 0.9),
                /* bóng chính lệch trái */
                -10px 8px 20px rgba(4, 25, 33, 0.8),
                /* bóng trung */
                0 0 15px rgba(55, 78, 109, 0.35);
            /* ánh xanh xám */
        }

        .form-group {
            margin-bottom: 15px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid transparent;
            outline: none;
            background: #0f172a;
            color: #fff;
            box-sizing: border-box;
            transition: 0.3s;

        }

        input:focus,
        select:focus,
        textarea:focus {
            border: 1px solid #22c55e;
            box-shadow:
                0 0 5px #22c55e,
                0 0 15px #22c55e,
                0 0 25px rgba(34, 197, 94, 0.5);
        }

        input:hover,
        select:hover,
        textarea:hover {
            border: 1px solid #4ade80;
        }

        textarea {
            height: 120px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #22c55e;
            color: #000;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 10px #22c55e;
        }

        button:hover {
            background: #16a34a;
            transition: calc(0.5s);
            box-shadow: 0 0 10px #22c55e;
        }

        .message {
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .success {
            color: #22c55e;
        }

        .error {
            color: #ef4444;
        }
    </style>
</head>

<body>
    <header class="header">
        <a href="index.html" class="home-btn">🏠 Trang chủ</a>
    </header>

    <div class="support-container">

        <h1>🎮 Trung tâm hỗ trợ</h1>

        <!-- FAQ -->
        <div class="faq">
            <h3 onclick="toggleFAQ(this)">❓ Không tải được game?</h3>
            <p>Hãy kiểm tra kết nối mạng hoặc thử lại sau.</p>
        </div>

        <div class="faq">
            <h3 onclick="toggleFAQ(this)">💳 Lỗi thanh toán?</h3>
            <p>Đảm bảo tài khoản của bạn đủ số dư hoặc thử phương thức khác.</p>
        </div>

        <!-- FORM -->
        <div class="form-box">
            <h2>Gửi yêu cầu hỗ trợ</h2>

            <form id="supportForm">
                <div class="form-group">
                    <input type="text" id="name" placeholder="ID của bạn...">
                </div>

                <div class="form-group">
                    <input type="email" id="email" placeholder="Email...">
                </div>

                <div class="form-group">
                    <select id="issue">
                        <option value="">-- Chọn vấn đề --</option>
                        <option>Tải game lỗi</option>
                        <option>Thanh toán</option>
                        <option>Tài khoản</option>
                        <option>Khác</option>
                    </select>
                </div>

                <div class="form-group">
                    <textarea id="messageText" placeholder="Mô tả vấn đề..."></textarea>
                </div>

                <button type="submit">Gửi yêu cầu</button>
            </form>

            <div id="responseMessage" class="message"></div>
        </div>

    </div>

    <script>
        function toggleFAQ(element) {
            const p = element.nextElementSibling;
            p.style.display = (p.style.display === "block") ? "none" : "block";
        }

        const form = document.getElementById("supportForm");
        const msg = document.getElementById("responseMessage");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const issue = document.getElementById("issue").value;
            const text = document.getElementById("messageText").value.trim();

            if (!name || !email || !issue || !text) {
                showMsg("Vui lòng điền đầy đủ thông tin!", "error");
                return;
            }

            if (!validateEmail(email)) {
                showMsg("Email không hợp lệ!", "error");
                return;
            }

            showMsg("🎉 Gửi yêu cầu thành công! Support sẽ phản hồi sớm.", "success");
            form.reset();
        });

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function showMsg(text, type) {
            msg.style.display = "block";
            msg.textContent = text;
            msg.className = "message " + type;
        }
    </script>

</body>

</html>
